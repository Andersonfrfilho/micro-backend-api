services:
  api:
    depends_on:
      database_postgres:
        condition: service_healthy
      database_mongo:
        condition: service_started
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NPM_TOKEN: ${NPM_TOKEN:-}
    container_name: ${PROJECT_NAME}_api
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    ports:
      - '${PORT}:${PORT}'
    volumes:
      - ./src:/app/src
      - ./dist:/app/dist
      - ./logs:/app/logs
    stdin_open: true
    tty: true

  ### DATABASE SERVICE
  database_postgres:
    image: postgres:18
    container_name: ${PROJECT_NAME}_database_postgres
    environment:
      - POSTGRES_USER=${DATABASE_POSTGRES_USER}
      - POSTGRES_PASSWORD=${DATABASE_POSTGRES_PASSWORD}
      - POSTGRES_DB=${DATABASE_POSTGRES_NAME}
    ports:
      - '${DATABASE_POSTGRES_PORT}:5432'
    volumes:
      - database_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  database_mongo:
    image: mongo:7
    container_name: ${PROJECT_NAME}_database_mongo
    restart: always
    ports:
      - '${DATABASE_MONGO_PORT}:27017'
    volumes:
      - database_mongo_data:/data/db
      - database_mongo_config:/data/configdb

  cache_redis:
    image: redis:7
    container_name: ${PROJECT_NAME}_cache_redis
    restart: always
    ports:
      - '${CACHE_REDIS_PORT}:6379'
    volumes:
      - cache_redis_data:/data

  queue_rabbitmq:
    image: rabbitmq:3.9-management
    container_name: ${PROJECT_NAME}_queue_rabbitmq
    ports:
      - '${QUEUE_RABBITMQ_PORT}:5672'
      - '${QUEUE_RABBITMQ_MANAGEMENT_PORT}:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${QUEUE_RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${QUEUE_RABBITMQ_PASS}
    volumes:
      - queue_rabbitmq_data:/var/lib/rabbitmq

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: ${PROJECT_NAME}_keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://database_keycloak:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
      KC_IMPORT_REALM: /opt/keycloak/data/import/backend-realm.json
    ports:
      - '${KEYCLOAK_PORT}:8080'
    depends_on:
      database_keycloak:
        condition: service_healthy
    # start Keycloak in dev mode and import realms placed under /opt/keycloak/data/import
    command: ['start-dev', '--import-realm']
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-config/backend-realm.json:/opt/keycloak/data/import/backend-realm.json

  database_keycloak:
    image: postgres:18
    container_name: ${PROJECT_NAME}_database_keycloak
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      POSTGRES_DB: keycloak
    volumes:
      - database_keycloak_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d keycloak']
      interval: 10s
      timeout: 5s
      retries: 5

  ### SONAR_QUBE SERVICES (Optional for worker)
  sonarqube:
    image: sonarqube:community
    container_name: ${PROJECT_NAME}_sonarqube
    depends_on:
      - sonar-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - '9001:9000'
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_temp:/opt/sonarqube/temp

  sonar-db:
    image: postgres:13
    container_name: ${PROJECT_NAME}_database_sonarqube
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_database:/var/lib/postgresql
      - sonar_database_postgres_data:/var/lib/postgresql/data

  # One-shot setup container: waits for SonarQube and creates an admin token
  sonar-setup:
    image: curlimages/curl:8.3.0
    container_name: ${PROJECT_NAME}_sonar_setup
    depends_on:
      - sonarqube
    volumes:
      - ./scripts/sonar-init.sh:/opt/sonar-init/sonar-init.sh:ro
      - ./sonar_output:/output
    environment:
      - SONAR_HOST=${SONAR_HOST_URL:-http://sonarqube:9000}
      - SONAR_ADMIN_PASSWORD=${SONAR_ADMIN_PASSWORD:-admin}
      - SONAR_ADMIN_NEW_PASSWORD=${SONAR_ADMIN_NEW_PASSWORD:-change_me}
      - SONAR_TOKEN_NAME=${SONAR_TOKEN_NAME:-ci-token}
    entrypoint: ['/bin/sh', '/opt/sonar-init/sonar-init.sh']

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_temp:
  sonar_database:
  sonar_database_postgres_data:
  database_postgres_data:
  database_mongo_data:
  database_mongo_config:
  cache_redis_data:
  queue_rabbitmq_data:
  keycloak_data:
  database_keycloak_data:
